site_name: Revfore Accelerate Docs
site_description: Documentation for Revfore Accelerate
site_url: https://YOUR_GITHUB_USERNAME.github.io/revfore-accelerate-docs/
repo_url: https://github.com/YOUR_GITHUB_USERNAME/revfore-accelerate-docs
repo_name: revfore-accelerate-docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts:
      - Tables: concepts/tables.md
      - Relationships: concepts/relationships.md
      - Views: concepts/views.md
  - Developer Guide:
      - Creating Tables: developer/creating-tables.md
  - Examples:
      - Overview: examples/index.md

extra:
  version:
    provider: mike
    default: latest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

copyright: Copyright © 2026 Revfore
